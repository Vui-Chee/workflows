name: Claude Code

on:
  workflow_call:
    secrets:
      anthropic_api_key:
        required: true
      token:
        required: true

concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    if: |
      !contains(github.actor, '[bot]') && (
        (contains(github.event.comment.body, '@claude') || contains(github.event.comment.body, '@review')) ||
        (contains(github.event.review.body, '@claude') || contains(github.event.review.body, '@review')) ||
        (github.event.action == 'opened' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    steps:
      - name: Check actor authorization
        id: check
        env:
          GH_TOKEN: ${{ secrets.token }}
        run: |
          PR_AUTHOR="${{ github.event.issue.user.login }}"
          if [ -z "$PR_AUTHOR" ]; then
            PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          fi
          ACTOR="${{ github.actor }}"
          echo "PR/Issue author: $PR_AUTHOR"
          echo "Triggered by: $ACTOR"
          if ! gh api repos/okx/xlayer-reth/collaborators --paginate --jq '.[].login' | grep -qx "$ACTOR"; then
            echo "Unauthorized: '$ACTOR' is not a collaborator of okx/xlayer-reth"
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Authorized: '$ACTOR' is a collaborator"
          if [[ "$ACTOR" != "$PR_AUTHOR" ]]; then
            echo "Unauthorized: '$ACTOR' is not the PR/issue author ('$PR_AUTHOR')"
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "authorized=true" >> "$GITHUB_OUTPUT"

  claude:
    needs: authorize
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    if: |
      needs.authorize.outputs.authorized == 'true' && (
        contains(github.event.comment.body, '@claude') ||
        contains(github.event.review.body, '@claude') ||
        (github.event.action == 'opened' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  claude-review:
    needs: authorize
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    if: |
      needs.authorize.outputs.authorized == 'true' && contains(github.event.comment.body, '@review')
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge trigger
        uses: actions/github-script@v7
        with:
          script: |
            const isReviewComment = context.eventName === 'pull_request_review_comment';
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: isReviewComment
                ? context.payload.comment.id
                : context.payload.comment.id,
              content: 'eyes'
            });

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install project skills globally
        run: |
          mkdir -p ~/.claude/skills
          cp -rfv .claude/skills/* ~/.claude/skills/
    
      - name: Run Claude Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: false
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Use the pr-review skill to perform a code review of this PR.

            When done, post your full review summary as a PR comment using:
            gh pr comment ${{ github.event.pull_request.number || github.event.issue.number }} --body "<your review>"
          claude_args: "--allowedTools Skill,SlashCommand,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
