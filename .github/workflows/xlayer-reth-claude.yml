name: Claude Code

on:
  workflow_call:
    secrets:
      anthropic_api_key:
        required: true
      token:
        required: true
      org_read_token:
        required: true
      gh_pat:
        required: true

concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    if: |
      !contains(github.actor, '[bot]') && (
        (contains(github.event.comment.body, '@claude') || contains(github.event.comment.body, '@review')) ||
        (contains(github.event.review.body, '@claude') || contains(github.event.review.body, '@review')) ||
        (github.event.action == 'opened' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    steps:
      - name: Check actor authorization
        id: check
        env:
          GH_TOKEN: ${{ secrets.org_read_token }}
        run: |
          PR_AUTHOR="${{ github.event.issue.user.login }}"
          if [ -z "$PR_AUTHOR" ]; then
            PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          fi
          ACTOR="${{ github.actor }}"
          echo "PR/Issue author: $PR_AUTHOR"
          echo "Triggered by: $ACTOR"
          if ! gh api orgs/okx/teams/blockchain-members/memberships/$ACTOR --silent 2>/dev/null; then
            echo "Unauthorized: '$ACTOR' is not a member of blockchain-members team"
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Authorized: '$ACTOR' is a member of blockchain-members team"
          # if [[ "$ACTOR" != "$PR_AUTHOR" ]]; then
          #   echo "Unauthorized: '$ACTOR' is not the PR/issue author ('$PR_AUTHOR')"
          #   echo "authorized=false" >> "$GITHUB_OUTPUT"
          #   exit 0
          # fi
          echo "authorized=true" >> "$GITHUB_OUTPUT"

  claude:
    needs: authorize
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    if: |
      needs.authorize.outputs.authorized == 'true' && (
        contains(github.event.comment.body, '@claude') ||
        contains(github.event.review.body, '@claude') ||
        (github.event.action == 'opened' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.gh_pat }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep"
