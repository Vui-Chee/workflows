name: Create Jira ticket on failure

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  create-ticket:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The CI pipeline just failed. Use the Jira REST API to create a bug ticket.
            POST to https://your-org.atlassian.net/rest/api/3/issue
            Auth: Basic base64($JIRA_EMAIL:$JIRA_API_TOKEN)
            Project key: ENG
            Issue type: Bug
            Summary: "CI failure on ${{ github.ref }} - ${{ github.event.workflow_run.name }}"
            Description: Link to run: ${{ github.event.workflow_run.html_url }}
            Use Bash to make the curl request.
          claude_args: --allowedTools "Bash(curl:*)"
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
