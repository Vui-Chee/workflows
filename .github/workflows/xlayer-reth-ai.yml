name: XLayer Reth AI

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      owner:
        required: true
        type: string
      repo:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      comment_body:
        required: true
        type: string

concurrency:
  group: xlayer-reth-ai-${{ inputs.pr_number || github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Post workflow run link
        id: working_comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          COMMENT_ID=$(gh api repos/${{ inputs.owner }}/${{ inputs.repo }}/issues/${{ inputs.pr_number }}/comments \
            --method POST \
            -f body="🤖 Claude is working on this — [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          repository: ${{ inputs.owner }}/${{ inputs.repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ secrets.GH_TOKEN }}
          submodules: recursive

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          prompt: "Repository: ${{ inputs.owner }}/${{ inputs.repo }}, PR #${{ inputs.pr_number }}.
          Before responding, use the Bash tool to run `gh issue view ${{ inputs.pr_number }} --repo ${{ inputs.owner }}/${{ inputs.repo }} --comments`
          to read the full issue/PR description and all previous comments as context. Then address the following request: ${{ inputs.comment_body }}

          IMPORTANT REVIEW INSTRUCTIONS:

          ## How to post review feedback
          - Always use inline PR review comments (NOT issue comments) for review feedback. Do NOT post a separate issue comment summarising the review — the inline review is sufficient.
          - Submit the review via the GitHub REST API. At the end of the top-level review body (summary field), always append: \"[workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\".

          ## First-time review
          - Before submitting any comments, spawn a subagent to validate each review point: for every issue you plan to raise, the subagent must verify that the concern is factually correct and actually applies to the code (e.g., the bug truly exists, the pattern is genuinely problematic, the suggestion is sound). The subagent should re-read the relevant code and context, and confirm or refute each point. Discard any point the subagent cannot confirm, and adjust any point that is only partially correct. Only submit validated points.

          ## Re-review or approval request
          - Carefully read ALL comments on the PR since your last review, including the author's replies to your previous inline comments. If the author explains that a flagged issue is intentional design, an accepted trade-off, or otherwise not a bug, accept that explanation and do not repeat the concern — unless you have clear technical evidence that the explanation is incorrect.
          - Fetch all unresolved inline review threads using GraphQL:
            `gh api graphql -f query='{ repository(owner: \"${{ inputs.owner }}\", name: \"${{ inputs.repo }}\") { pullRequest(number: ${{ inputs.pr_number }}) { reviewThreads(first: 50) { nodes { id isResolved isOutdated comments(first: 10) { nodes { body author { login } } } } } } } }'`
          - For each unresolved, non-outdated thread: determine whether the concern has been addressed in code or accepted by the author. If yes, resolve it via GraphQL:
            `gh api graphql -f query='mutation { resolveReviewThread(input: { threadId: \"<id>\" }) { thread { isResolved } } }'`
          - After resolving threads, if no new issues remain, submit an APPROVE review. Otherwise submit REQUEST_CHANGES listing only the still-open concerns."
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep,WebFetch"
          show_full_output: true

      - name: Delete working comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api --method DELETE \
            repos/${{ inputs.owner }}/${{ inputs.repo }}/issues/comments/${{ steps.working_comment.outputs.comment_id }}
