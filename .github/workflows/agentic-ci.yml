name: Agentic CI

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      owner:
        required: true
        type: string
      repo:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string

concurrency:
    group: agentic-ci-${{ inputs.pr_number || github.event.pull_request.number || github.event.issue.number }}
    cancel-in-progress: false

jobs:
  run-ci-with-ai:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          repository: ${{ inputs.owner }}/${{ inputs.repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ secrets.GH_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: false     
          workspaces: |
            ". -> target"
            "rust -> rust/target"
          
      - name: Run CI based on repo
        id: agentic-ci
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          prompt: |
            Repository: ${{ inputs.owner }}/${{ inputs.repo }}
            PR: #${{ inputs.pr_number }}
      
            You are an agentic CI assistant.
      
            Your task:

            0. Check for git submodules:
              - Run: cat .gitmodules 2>/dev/null || echo "No submodules"
              - If submodules exist, run:
                git submodule update --init --recursive

            0.5. Check for build configuration files:
              - Search for Makefile, justfile, or .justfile at root and depth 1:
                find . -maxdepth 2 \( -name "Makefile" -o -name "justfile" -o -name ".justfile" \) 2>/dev/null
              - For each found file, scan for relevant targets: fmt, format, lint, clippy, test, check, build
              - Run commands from the directory containing the file, e.g.:
                cd rust && just fmt
              - Prefer these targets over raw commands. Pay attention to toolchain requirements:
                - `cargo +nightly fmt` → install nightly: rustup toolchain install nightly
                - `rustup component add rustfmt clippy --toolchain nightly` if needed
              - If justfile is present, ensure `just` is installed:
                just --version 2>/dev/null || cargo install just
              - Use Makefile/justfile targets as source of truth.
                Only fall back to raw commands if no relevant targets are found.
      
            1. Determine the changed files for this PR using git.
              - Run:
                git fetch origin
                git diff --name-only origin/${{ github.base_ref }}...HEAD
      
            2. Infer affected stacks:
              - Go → go.mod, *.go
              - Rust → Cargo.toml, Cargo.lock, *.rs, rust/**
              - Python → pyproject.toml, requirements.txt, poetry.lock, Pipfile.lock, *.py
              - Node/TypeScript → package.json, lockfiles, tsconfig.json, *.js, *.jsx, *.ts, *.tsx
      
            3. Decide execution:
              - One stack → run it
              - Multiple stacks → run ALL
              - Unclear → inspect repo
      
            4. For EACH selected stack:
              - Ensure toolchain is installed
              - Install dependencies if needed
      
               Then run BOTH formatting AND tests:
      
               Go:
                 go fmt ./...
                 go vet ./...
                 go test ./...
      
               Rust:
                 cargo fmt --all -- --check
                 cargo clippy --all-targets --all-features -- -D warnings
                 cargo test --all
      
               Python:
                 pip install -r requirements.txt OR install via pyproject
                 ruff check . OR flake8 . (if available)
                 black --check . (if available)
                 pytest -q OR python -m unittest
      
               Node/TypeScript:
                 install deps (npm/yarn/pnpm)
                 npm run format --if-present
                 npm run lint --if-present
                 npm test --if-present
                 npm run build --if-present
      
            5. If formatting issues are found:
              - STOP immediately. Do not attempt to fix them.
              - Report the formatting check output and exit.
      
            6. If ANY check fails (non-zero exit code):
              - STOP immediately. Do not attempt to diagnose, fix, or re-run.
              - Report the failing command, its exit code, and its full output.
              - Do not run any further checks.

            7. Output:
              - Detected stacks
              - Commands run
              - Results
              - Fixes applied
      
            Follow CLAUDE.md if present. Keep changes minimal and scoped.
      
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep"
          show_full_output: true

      - name: Post result as comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          RESPONSE=$(jq -r '.[] | select(.type == "result") | .result' /home/runner/work/_temp/claude-execution-output.json)
          if [ -n "$RESPONSE" ]; then
            gh issue comment ${{ inputs.pr_number }} \
              --repo ${{ inputs.owner }}/${{ inputs.repo }} \
              --body "$RESPONSE"
          fi
      # TODO: report to Lark?