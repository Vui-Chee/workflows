name: XLayer Reth CI

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      owner:
        required: true
        type: string
      repo:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string

env:
  DEFAULT_BRANCH: refs/heads/main

concurrency:
    group: xlayer-reth-ci-${{ inputs.pr_number || github.event.pull_request.number || github.event.issue.number }}
    cancel-in-progress: true
 
jobs:
  basic-checks:
    permissions:
      contents: read
    timeout-minutes: 60
    runs-on: ubuntu-latest
    outputs:
      format_check: ${{ steps.format_check.outcome }}
      compile_check: ${{ steps.compile_check.outcome }}
      clippy_check: ${{ steps.clippy_check.outcome }}
      test: ${{ steps.test.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          repository: ${{ inputs.owner }}/${{ inputs.repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ secrets.GH_TOKEN }}
          submodules: recursive

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h

          # Remove unnecessary pre-installed software to free up space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          echo ""
          echo "Disk space after cleanup:"
          df -h

      - name: Get Rust version from Cargo.toml
        id: rust-version
        run: |
          RUST_VERSION=$(grep '^rust-version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Rust version from Cargo.toml: $RUST_VERSION"
          echo "version=$RUST_VERSION" >> $GITHUB_OUTPUT

      - uses: extractions/setup-just@v3
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}
          components: rustfmt, clippy
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: false
          workspaces: |
            . -> target
            deps/optimism/rust -> target

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run format check
        id: format_check
        run: |
          just check-format

      - name: Run compile check
        id: compile_check
        run: |
          # Helps check compile issues + precompiles for test. 
          cargo test --workspace --no-run

      - name: Run clippy
        id: clippy_check
        run: |
          just check-clippy

      - name: Run tests
        id: test
        run: |
          just test

  report:
    needs: [basic-checks]
    # Skip reporting on merging to default branch.
    if: ${{ always() && inputs.pr_number != '' }}
    permissions:
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Set commit status on target repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          post_status() {
            local context="$1"
            local outcome="$2"
            case "$outcome" in
              success)   state="success" ;;
              failure)   state="failure" ;;
              cancelled) state="error"   ;;
              *)         state="error"   ;;
            esac

            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ inputs.owner }}/${{ inputs.repo }}/statuses/${{ inputs.head_sha }} \
              -f state="$state" \
              -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              -f description="$context $state" \
              -f context="xlayer-reth-ci / $context"
          }

          post_status "format-check"  "${{ needs.basic-checks.outputs.format_check }}"
          post_status "compile-check" "${{ needs.basic-checks.outputs.compile_check }}"
          post_status "clippy"        "${{ needs.basic-checks.outputs.clippy_check }}"
          post_status "tests"         "${{ needs.basic-checks.outputs.test }}"

      - name: Report result to PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ "${{ needs.basic-checks.result }}" = "success" ]; then
            ICON=":white_check_mark:"
            STATUS="passed"
          else
            ICON=":x:"
            STATUS="failed"
          fi

          status_icon() {
            case "$1" in
              success)   echo ":white_check_mark: success" ;;
              failure)   echo ":x: failure" ;;
              cancelled) echo ":warning: cancelled" ;;
              skipped)   echo ":fast_forward: skipped" ;;
              *)         echo ":black_circle: unknown" ;;
            esac
          }

          BODY=$(cat <<EOF
          ${ICON} **XLayer Reth CI ${STATUS}** for commit \`${{ inputs.head_sha }}\`

          | Step | Result |
          |------|--------|
          | format-check | $(status_icon '${{ needs.basic-checks.outputs.format_check }}') |
          | compile-check   | $(status_icon '${{ needs.basic-checks.outputs.compile_check }}') |
          | clippy       | $(status_icon '${{ needs.basic-checks.outputs.clippy_check }}') |
          | tests        | $(status_icon '${{ needs.basic-checks.outputs.test }}') |

          [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          )

          gh issue comment ${{ inputs.pr_number }} \
            --repo ${{ inputs.owner }}/${{ inputs.repo }} \
            --body "$BODY"
