name: Dummy

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      owner:
        required: true
        type: string
      repo:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      comment_body:
        required: false
        type: string

concurrency:
  group: dummy-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      dummy-ci: ${{ steps.dummy-ci.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          repository: ${{ inputs.owner }}/${{ inputs.repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Run CI 
        id: dummy-ci
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run:
          echo "Fake test!!!"
   
  report:
    runs-on: ubuntu-latest
    needs: ["test"]
    steps:
      - name: Set commit status on target repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          post_status() {
            local context="$1"
            local outcome="$2"
            case "$outcome" in
              success)   state="success" ;;
              failure)   state="failure" ;;
              cancelled) state="error"   ;;
              *)         state="error"   ;;
            esac

            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ inputs.owner }}/${{ inputs.repo }}/statuses/${{ inputs.head_sha }} \
              -f state="$state" \
              -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              -f description="$context $state" \
              -f context="xlayer-reth-ci / $context"
          }

          post_status "basic-ci"  "${{ needs.test.outputs.dummy-ci }}"
